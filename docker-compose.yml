services:

  # -------------------------------------------------------
  # PostgreSQL Database
  # -------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: project_hall_db
    restart: always
    ports:
      - "5433:5432"       # 5433 on host → avoids clash with any native PG on host
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: project_hall
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d project_hall"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # -------------------------------------------------------
  # Express Backend (Auth API)
  # -------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: project_hall_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # Override DB connection for Docker network — backend reaches db by service name
      NODE_ENV: development
      PORT: 5000
      PGHOST: db          # service name on Docker internal network
      PGPORT: 5432        # internal container port (not the host-side 5433 mapping)
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: project_hall
      JWT_ISSUER: http://localhost:5000
      JWT_AUDIENCE: http://localhost:5173
      # Google OAuth2
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: http://localhost:5000/api/auth/google/callback
      FRONTEND_URL: http://localhost:5173
      SESSION_SECRET: project_hall_dev_session_secret_change_in_prod
    volumes:
      # Bind-mount source for hot-reload (nodemon watches these)
      - ./backend/src:/app/src
      - ./backend/tests:/app/tests
      - ./backend/init.sql:/app/init.sql
      # Host bind mount for RSA keypair — keys live on your machine at ./backend/.keys
      # Survives ALL docker compose operations including `down -v`
      - ./backend/.keys:/app/.keys
      # Named volume for uploaded project thumbnails
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy  # Wait for Postgres to actually accept connections

volumes:
  postgres_data:
  uploads_data:
 